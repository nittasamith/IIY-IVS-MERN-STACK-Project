<!DOCTYPE html>
<html>
<head>
<title>Register - TimeWork</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body>

<div class="login-wrapper">

<div class="login-left">
<h2>Join TimeWork</h2>
</div>

<div class="login-right">

<h2 data-translate="register">Create Account</h2>

<input type="text" id="name" class="input" placeholder="Full Name">

<input type="email" id="email" class="input" placeholder="Email">

<input type="password" id="password" class="input" placeholder="Password">

<input type="password" id="comfirmpassword" class="input" placeholder="Confirm Password">

<p>Register as:</p>
<br>
<label>
<input type="radio" name="role" value="Job Seeker"> Job Seeker
</label>

<label>
<input type="radio" name="role" value="Job Provider"> Job Provider
</label>

<br><br>

<button id="registerBtn">Register</button>

<p style="margin-top:10px">
Already have an account?
<a href="userlogin.html">Login</a>
</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
